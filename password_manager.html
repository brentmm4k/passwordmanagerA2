<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Manager</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ══════════ LOGIN ══════════ -->
  <div class="screen active" id="screen-login">
    <div class="card">
      <h1>🔒 Password Manager</h1>
      <p class="sub" id="login-subtitle"></p>

      <div class="field">
        <label>I am a</label>
        <div class="role-toggle">
          <button onclick="selectRole('student')" class="active" id="rb-student">Student</button>
          <button onclick="selectRole('faculty')" id="rb-faculty">Faculty</button>
          <button onclick="selectRole('staff')"   id="rb-staff">Staff</button>
        </div>
      </div>

      <div id="auth-section">
        <div class="field">
          <label>Auth Code</label>
          <input type="password" id="auth-code" placeholder="Enter your auth code">
          <p style="color:var(--muted);font-size:12px;margin-top:4px">Contact your administrator if you don't have a code.</p>
        </div>
      </div>

      <div class="field">
        <label>Master Password</label>
        <input type="password" id="login-pw" placeholder="Master password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="field" id="confirm-wrap">
        <label>Confirm Password</label>
        <input type="password" id="login-conf" placeholder="Confirm password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>

      <div class="btn-row">
        <button class="btn-primary" id="login-btn" onclick="doLogin()">Create Vault</button>
      </div>
      <div class="msg" id="login-msg"></div>
    </div>
  </div>

  <!-- ══════════ MAIN ══════════ -->
  <div class="screen" id="screen-main">
    <nav id="main-nav"></nav>

    <!-- Passwords -->
    <div id="tab-passwords">
      <h2>Saved Passwords</h2>
      <div class="search-wrap">
        <input type="text" id="pw-search" placeholder="Search by site or username…" oninput="renderPasswords()">
      </div>
      <div class="list-scroll" id="pw-list"></div>
    </div>

    <!-- Add Password -->
    <div id="tab-add" style="display:none">
      <h2>Add Password</h2>
      <div class="field"><label>Site / App</label><input type="text" id="add-site" placeholder="e.g. github.com"></div>
      <div class="field"><label>Username / Email</label><input type="text" id="add-user" placeholder="you@example.com"></div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="add-pw" placeholder="Password" oninput="updateStrength(this.value,'add-strength-wrap','add-strength-bar','add-strength-lbl')">
        <div class="strength-wrap" id="add-strength-wrap" style="display:none">
          <div class="strength-row"><span>Password strength</span><span id="add-strength-lbl"></span></div>
          <div class="bar-bg"><div class="bar-fill" id="add-strength-bar"></div></div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-neutral" onclick="generateIntoAdd()">Generate Password</button>
        <button class="btn-success" onclick="doAddPassword()">Save</button>
      </div>
      <div class="msg" id="add-msg"></div>
    </div>

    <!-- Cards -->
    <div id="tab-cards" style="display:none">
      <h2>Saved Cards</h2>
      <div class="list-scroll" id="card-list"></div>
    </div>

    <!-- Add Card -->
    <div id="tab-add-card" style="display:none">
      <h2>Add Card</h2>
      <p class="sub">All card data is encrypted with your master password.</p>
      <div class="field"><label>Cardholder Name</label><input type="text" id="ac-holder" placeholder="Full name"></div>
      <div class="field"><label>Card Number</label><input type="text" id="ac-number" placeholder="Digits only" maxlength="19" oninput="this.value=this.value.replace(/\D/g,'').slice(0,16)"></div>
      <div class="row">
        <div class="field"><label>Expiry (MM/YY)</label><input type="text" id="ac-expiry" placeholder="MM/YY" maxlength="5" oninput="fmtExpiry(this)"></div>
        <div class="field"><label>CVV</label><input type="password" id="ac-cvv" placeholder="3–4 digits" maxlength="4"></div>
      </div>
      <div class="field"><label>Card Type</label>
        <select id="ac-type"><option>Visa</option><option>Mastercard</option><option>Amex</option><option>Other</option></select>
      </div>
      <div class="btn-row"><button class="btn-success" onclick="doAddCard()">Save Card</button></div>
      <div class="msg" id="add-card-msg"></div>
    </div>

    <!-- Generate -->
    <div id="tab-generate" style="display:none">
      <h2>Generate Password</h2>
      <div class="slider-wrap">
        <div class="slider-lbl"><span>Length</span><span id="gen-len-val">16</span></div>
        <input type="range" id="gen-len" min="8" max="64" value="16" oninput="document.getElementById('gen-len-val').textContent=this.value">
      </div>
      <div class="check-grid">
        <label class="check-label"><input type="checkbox" id="gen-upper"   checked> Uppercase (A–Z)</label>
        <label class="check-label"><input type="checkbox" id="gen-lower"   checked> Lowercase (a–z)</label>
        <label class="check-label"><input type="checkbox" id="gen-digits"  checked> Digits (0–9)</label>
        <label class="check-label"><input type="checkbox" id="gen-symbols" checked> Symbols (!@#…)</label>
      </div>
      <button class="btn-primary" onclick="doGenerate()">Generate</button>
      <div class="gen-result" id="gen-result" style="display:none">
        <span id="gen-output" style="flex:1"></span>
        <button class="btn-ghost" onclick="copyGen()">Copy</button>
      </div>
      <div class="msg" id="gen-msg"></div>
    </div>

    <!-- Minerva DB -->
    <div id="tab-minerva" style="display:none">
      <h2 style="color:var(--minerva)">🟣 Minerva Database</h2>
      <p class="sub" id="minerva-sub"></p>
      <div class="search-wrap">
        <input type="text" id="minerva-search" placeholder="Search by username…" oninput="renderMinerva()">
      </div>
      <div class="list-scroll" id="minerva-list"></div>
    </div>
  </div>
</div>

<div id="toast">Copied!</div>

<script>
// ═══════════════════════════════════════════
//  AUTH CODES  (edit these to match your pm_auth_codes.json)
// ═══════════════════════════════════════════
const AUTH_CODES = { faculty: ['FACULTY-0001'], staff: ['STAFF-0001'] };
const MINERVA_DOMAIN = 'minerva.bsu.com';

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const S = { cryptoKey: null, role: null, vaults: {} };

// ═══════════════════════════════════════════
//  CRYPTO  (Web Crypto API — all client-side)
// ═══════════════════════════════════════════
async function deriveKey(pw, salt) {
  const km = await crypto.subtle.importKey('raw', enc(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:390000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function hashPw(pw, salt) {
  const km = await crypto.subtle.importKey('raw', enc(pw), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits({ name:'PBKDF2', salt, iterations:390000, hash:'SHA-256' }, km, 256);
  return [...new Uint8Array(bits)].map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function encVault(key, data) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, key, enc(JSON.stringify(data)));
  const merged = new Uint8Array(12 + ct.byteLength);
  merged.set(iv); merged.set(new Uint8Array(ct), 12);
  return btoa(String.fromCharCode(...merged));
}
async function decVault(key, b64) {
  const buf = Uint8Array.from(atob(b64), c=>c.charCodeAt(0));
  const pt  = await crypto.subtle.decrypt({ name:'AES-GCM', iv: buf.slice(0,12) }, key, buf.slice(12));
  return JSON.parse(new TextDecoder().decode(pt));
}
const enc = s => new TextEncoder().encode(s);

// ═══════════════════════════════════════════
//  LOCALSTORAGE
// ═══════════════════════════════════════════
const LS_MASTER = 'pm_master_v1';
const lsKey     = r => `pm_vault_${r}_v1`;

function masterExists() { return !!localStorage.getItem(LS_MASTER); }

async function createMaster(pw) {
  const salt = crypto.getRandomValues(new Uint8Array(32));
  const hash = await hashPw(pw, salt);
  localStorage.setItem(LS_MASTER, JSON.stringify({ hash, salt:[...salt] }));
}
async function verifyMaster(pw) {
  const d = JSON.parse(localStorage.getItem(LS_MASTER));
  const salt = new Uint8Array(d.salt);
  if (await hashPw(pw, salt) !== d.hash) return false;
  S.cryptoKey = await deriveKey(pw, salt);
  return true;
}
async function loadVault(role) {
  const raw = localStorage.getItem(lsKey(role));
  if (!raw) return { passwords:[], cards:[] };
  try { return await decVault(S.cryptoKey, raw); } catch { return { passwords:[], cards:[] }; }
}
async function saveVault(role) {
  localStorage.setItem(lsKey(role), await encVault(S.cryptoKey, S.vaults[role]));
}

// ═══════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════
let selRole = 'student';

function selectRole(r) {
  selRole = r;
  ['student','faculty','staff'].forEach(x =>
    document.getElementById(`rb-${x}`).classList.toggle('active', x===r));
  document.getElementById('auth-section').style.display = r==='student' ? 'none' : 'block';
}

async function doLogin() {
  const pw = document.getElementById('login-pw').value.trim();
  setMsg('login-msg','','');
  if (['faculty','staff'].includes(selRole)) {
    const code = document.getElementById('auth-code').value.trim();
    if (!code) { setMsg('login-msg','Auth code required for faculty/staff.','err'); return; }
    if (!(AUTH_CODES[selRole]||[]).includes(code)) { setMsg('login-msg','Invalid auth code. Access denied.','err'); return; }
  }
  if (!pw) { setMsg('login-msg','Password cannot be empty.','err'); return; }
  if (!masterExists()) {
    const conf = document.getElementById('login-conf').value.trim();
    if (pw !== conf) { setMsg('login-msg','Passwords do not match.','err'); return; }
    if (pw.length < 6) { setMsg('login-msg','Use at least 6 characters.','err'); return; }
    await createMaster(pw);
  }
  if (!await verifyMaster(pw)) { setMsg('login-msg','Incorrect master password.','err'); return; }
  S.role = selRole;
  for (const r of ['student','faculty','staff']) S.vaults[r] = await loadVault(r);
  showMain();
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
let activeTab = 'passwords';

function showMain() {
  document.getElementById('screen-login').classList.remove('active');
  document.getElementById('screen-main').classList.add('active');
  buildNav(); switchTab('passwords');
}

function buildNav() {
  const tabs = [
    { id:'passwords', label:'Passwords' },
    { id:'add',       label:'Add PW'    },
    { id:'cards',     label:'Cards'     },
    { id:'add-card',  label:'Add Card'  },
    { id:'generate',  label:'Generate'  },
  ];
  if (['faculty','staff'].includes(S.role))
    tabs.push({ id:'minerva', label:'🟣 Minerva DB', cls:'minerva' });
  tabs.push({ id:'lock', label:'Lock' });
  document.getElementById('main-nav').innerHTML = tabs.map(t =>
    `<button id="nav-${t.id}" class="${t.cls||''}" onclick="navClick('${t.id}')">${t.label}</button>`
  ).join('');
}

function navClick(id) { id==='lock' ? doLock() : switchTab(id); }

function switchTab(id) {
  activeTab = id;
  document.querySelectorAll('#screen-main>div[id^="tab-"]').forEach(el=>el.style.display='none');
  document.getElementById(`tab-${id}`).style.display = 'block';
  document.querySelectorAll('#main-nav button').forEach(b=>{
    b.classList.remove('active');
    if (b.id===`nav-${id}`) b.classList.add('active');
  });
  if (id==='passwords') renderPasswords();
  if (id==='cards')     renderCards();
  if (id==='minerva')   renderMinerva();
}

function doLock() {
  S.cryptoKey=null; S.role=null; S.vaults={};
  ['login-pw','login-conf','auth-code'].forEach(id=>document.getElementById(id).value='');
  setMsg('login-msg','','');
  document.getElementById('screen-main').classList.remove('active');
  document.getElementById('screen-login').classList.add('active');
}

// ═══════════════════════════════════════════
//  PASSWORDS TAB
// ═══════════════════════════════════════════
function renderPasswords() {
  const q   = document.getElementById('pw-search').value.trim().toLowerCase();
  const pws = S.vaults[S.role].passwords;
  const hits = q ? pws.filter(e=>e.site.toLowerCase().includes(q)||e.username.toLowerCase().includes(q)) : pws;
  const list = document.getElementById('pw-list');
  if (!hits.length) {
    list.innerHTML=`<div class="empty">${q?'No entries found.':'No saved passwords yet. Use Add PW to get started.'}</div>`;
    return;
  }
  list.innerHTML = hits.map(e=>{
    const i = pws.indexOf(e);
    return `<div class="entry-row">
      <span class="entry-site">${x(e.site)}</span>
      <span class="entry-user">${x(e.username)}</span>
      <span class="entry-pw" id="pv${i}">${'•'.repeat(Math.min(e.password.length,16))}</span>
      <div class="entry-actions">
        <button class="btn-neutral btn-sm" onclick="togglePw(${i})" id="pb${i}">Show</button>
        <button class="btn-neutral btn-sm" onclick="copyText('${x(e.password).replace(/'/g,"\\'")}','Password')">Copy</button>
        <button class="btn-danger  btn-sm" onclick="deletePw(${i})">Delete</button>
      </div></div>`;
  }).join('');
}

function togglePw(i) {
  const e=S.vaults[S.role].passwords[i], lbl=document.getElementById(`pv${i}`), btn=document.getElementById(`pb${i}`);
  if (btn.textContent==='Show'){lbl.textContent=e.password; btn.textContent='Hide';}
  else{lbl.textContent='•'.repeat(Math.min(e.password.length,16)); btn.textContent='Show';}
}

async function deletePw(i) {
  S.vaults[S.role].passwords.splice(i,1);
  await saveVault(S.role); renderPasswords();
}

// ═══════════════════════════════════════════
//  ADD PASSWORD TAB
// ═══════════════════════════════════════════
function updateStrength(pw, wrapId, barId, lblId) {
  const wrap=document.getElementById(wrapId), bar=document.getElementById(barId), lbl=document.getElementById(lblId);
  if (!pw) { wrap.style.display='none'; return; }
  wrap.style.display='block';
  const {score,label,color}=strength(pw);
  lbl.textContent=label; lbl.style.color=color;
  bar.style.width=Math.round(score/8*100)+'%'; bar.style.background=color;
}

function generateIntoAdd() {
  const pw=genPw(16,true,true,true,true);
  document.getElementById('add-pw').value=pw;
  updateStrength(pw,'add-strength-wrap','add-strength-bar','add-strength-lbl');
  setMsg('add-msg',`Generated: ${pw}`,'ok');
}

async function doAddPassword() {
  const site=document.getElementById('add-site').value.trim();
  const user=document.getElementById('add-user').value.trim();
  const pw  =document.getElementById('add-pw').value;
  if (!site||!user||!pw){setMsg('add-msg','All fields are required.','err');return;}
  S.vaults[S.role].passwords.push({site,username:user,password:pw});
  await saveVault(S.role);
  ['add-site','add-user','add-pw'].forEach(id=>document.getElementById(id).value='');
  updateStrength('','add-strength-wrap','add-strength-bar','add-strength-lbl');
  setMsg('add-msg',`'${site}' saved successfully!`,'ok');
}

// ═══════════════════════════════════════════
//  CARDS TAB
// ═══════════════════════════════════════════
function maskCard(n) {
  const d=n.replace(/\D/g,''); return d.length<4?'•'.repeat(d.length):'•••• •••• •••• '+d.slice(-4);
}

function renderCards() {
  const cards=S.vaults[S.role].cards, list=document.getElementById('card-list');
  if (!cards.length){list.innerHTML='<div class="empty">No saved cards yet. Use Add Card to get started.</div>';return;}
  list.innerHTML=cards.map((c,i)=>`
    <div class="card-entry">
      <div class="card-hdr">
        <span class="ctype-badge">${x(c.card_type)}</span>
        <span class="card-holder">${x(c.cardholder)}</span>
        <span class="card-expiry">Expires ${x(c.expiry)}</span>
      </div>
      <div class="card-row">
        <span class="card-num" id="cn${i}">${maskCard(c.number)}</span>
        <button class="btn-neutral btn-sm" onclick="toggleCard(${i},'num')" id="cnb${i}">Show Number</button>
        <span style="color:var(--muted);font-size:12px">CVV:</span>
        <span class="card-cvv" id="cv${i}">•••</span>
        <button class="btn-neutral btn-sm" onclick="toggleCard(${i},'cvv')" id="cvb${i}">Show CVV</button>
        <button class="btn-danger  btn-sm" onclick="deleteCard(${i})">Delete</button>
      </div>
    </div>`).join('');
}

function toggleCard(i,f) {
  const c=S.vaults[S.role].cards[i];
  if(f==='num'){
    const lbl=document.getElementById(`cn${i}`),btn=document.getElementById(`cnb${i}`);
    if(btn.textContent==='Show Number'){lbl.textContent=c.number.replace(/\D/g,'').match(/.{1,4}/g).join(' ');btn.textContent='Hide Number';}
    else{lbl.textContent=maskCard(c.number);btn.textContent='Show Number';}
  } else {
    const lbl=document.getElementById(`cv${i}`),btn=document.getElementById(`cvb${i}`);
    if(btn.textContent==='Show CVV'){lbl.textContent=c.cvv;btn.textContent='Hide CVV';}
    else{lbl.textContent='•••';btn.textContent='Show CVV';}
  }
}

async function deleteCard(i){S.vaults[S.role].cards.splice(i,1);await saveVault(S.role);renderCards();}

function fmtExpiry(el){
  let v=el.value.replace(/\D/g,'').slice(0,4);
  el.value=v.length>2?v.slice(0,2)+'/'+v.slice(2):v;
}

async function doAddCard() {
  const holder=document.getElementById('ac-holder').value.trim();
  const number=document.getElementById('ac-number').value.replace(/\D/g,'');
  const expiry=document.getElementById('ac-expiry').value.trim();
  const cvv   =document.getElementById('ac-cvv').value.trim();
  const ctype =document.getElementById('ac-type').value;
  if(!holder||!number||!expiry||!cvv){setMsg('add-card-msg','All fields are required.','err');return;}
  if(!/^\d{13,19}$/.test(number)){setMsg('add-card-msg','Card number must be 13–19 digits.','err');return;}
  if(!/^\d{2}\/\d{2}$/.test(expiry)){setMsg('add-card-msg','Expiry must be MM/YY.','err');return;}
  if(!/^\d{3,4}$/.test(cvv)){setMsg('add-card-msg','CVV must be 3 or 4 digits.','err');return;}
  S.vaults[S.role].cards.push({cardholder:holder,number,expiry,cvv,card_type:ctype});
  await saveVault(S.role);
  ['ac-holder','ac-number','ac-expiry','ac-cvv'].forEach(id=>document.getElementById(id).value='');
  setMsg('add-card-msg',`Card ending in ${number.slice(-4)} saved!`,'ok');
}

// ═══════════════════════════════════════════
//  GENERATE TAB
// ═══════════════════════════════════════════
function doGenerate() {
  const pw=genPw(
    +document.getElementById('gen-len').value,
    document.getElementById('gen-upper').checked,
    document.getElementById('gen-lower').checked,
    document.getElementById('gen-digits').checked,
    document.getElementById('gen-symbols').checked
  );
  document.getElementById('gen-output').textContent=pw;
  document.getElementById('gen-result').style.display='flex';
  setMsg('gen-msg',`Strength: ${strength(pw).label}`,'ok');
}
function copyGen(){copyText(document.getElementById('gen-output').textContent,'Password');}

// ═══════════════════════════════════════════
//  MINERVA DB TAB
// ═══════════════════════════════════════════
function renderMinerva() {
  document.getElementById('minerva-sub').innerHTML=
    `Showing all <code>${MINERVA_DOMAIN}</code> entries across <b>all</b> vaults. Accessible to <b>${S.role}</b> only.`;
  const q=document.getElementById('minerva-search').value.trim().toLowerCase();
  const all=[];
  for(const r of ['student','faculty','staff']){
    (S.vaults[r]||{passwords:[]}).passwords.forEach((e,idx)=>{
      if(e.site.toLowerCase().includes(MINERVA_DOMAIN)) all.push({...e,_r:r,_i:idx});
    });
  }
  const hits=q?all.filter(e=>e.username.toLowerCase().includes(q)):all;
  const list=document.getElementById('minerva-list');
  if(!hits.length){
    list.innerHTML=`<div class="empty">No <code>${MINERVA_DOMAIN}</code> entries found${q?' matching your search':' in any vault'}.</div>`;
    return;
  }
  list.innerHTML=`<p style="color:var(--minerva);font-size:13px;margin-bottom:12px"><b>${hits.length}</b> Minerva account(s) found across all vaults.</p>`+
    hits.map((e,i)=>`
    <div class="entry-row">
      <span class="role-badge ${e._r}">${e._r}</span>
      <span class="entry-site" style="color:var(--minerva)">${x(e.site)}</span>
      <span class="entry-user">${x(e.username)}</span>
      <span class="entry-pw" id="mv${i}">${'•'.repeat(Math.min(e.password.length,16))}</span>
      <div class="entry-actions">
        <button class="btn-neutral btn-sm" onclick="toggleMinerva(${i},this,'${e.password.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">Show</button>
        <button class="btn-danger  btn-sm" onclick="deleteMinerva('${e._r}',${e._i})">Delete</button>
      </div></div>`).join('');
}

function toggleMinerva(i,btn,pw){
  const lbl=document.getElementById(`mv${i}`);
  if(btn.textContent==='Show'){lbl.textContent=pw;btn.textContent='Hide';}
  else{lbl.textContent='•'.repeat(Math.min(pw.length,16));btn.textContent='Show';}
}

async function deleteMinerva(role,idx){
  S.vaults[role].passwords.splice(idx,1);
  await saveVault(role); renderMinerva();
}

// ═══════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════
function genPw(len=16,upper=true,lower=true,digits=true,syms=true){
  const U='ABCDEFGHIJKLMNOPQRSTUVWXYZ', L='abcdefghijklmnopqrstuvwxyz',
        D='0123456789', Y='!@#$%^&*()_+-=[]{}|;:,.<>?';
  let pool='', must=[];
  if(upper){pool+=U; must.push(pick(U));}
  if(lower){pool+=L; must.push(pick(L));}
  if(digits){pool+=D; must.push(pick(D));}
  if(syms){pool+=Y; must.push(pick(Y));}
  if(!pool) pool=U+L+D;
  const rest=Array.from({length:len-must.length},()=>pick(pool));
  const all=[...must,...rest];
  for(let i=all.length-1;i>0;i--){const j=rnd(i+1);[all[i],all[j]]=[all[j],all[i]];}
  return all.join('');
}
function rnd(n){const a=new Uint32Array(1);crypto.getRandomValues(a);return a[0]%n;}
function pick(s){return s[rnd(s.length)];}

function strength(pw){
  if(!pw) return{score:0,label:'',color:''};
  let sc=0,cl=0;
  if(/[A-Z]/.test(pw)){sc++;cl++;}
  if(/[a-z]/.test(pw)){sc++;cl++;}
  if(/\d/.test(pw)){sc++;cl++;}
  if(/[^A-Za-z\d]/.test(pw)){sc++;cl++;}
  if(cl===4){
    if(pw.length>=8)sc++; if(pw.length>=12)sc++; if(pw.length>=16)sc++; if(pw.length>=20)sc++;
  }
  if(sc<=2) return{score:sc,label:'Weak',       color:'#dc2626'};
  if(sc<=4) return{score:sc,label:'Mediocre',   color:'#d97706'};
  if(sc<=6) return{score:sc,label:'Outstanding',color:'#2563eb'};
  return          {score:sc,label:'Amazing',    color:'#16a34a'};
}

function x(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

function setMsg(id,text,type){
  const el=document.getElementById(id); el.textContent=text; el.className='msg'+(type?' '+type:'');
  if(text) setTimeout(()=>{if(el.textContent===text)el.textContent='';},4000);
}

let _toastT;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(()=>t.classList.remove('show'),1800);
}
function copyText(text,label=''){
  navigator.clipboard.writeText(text).then(()=>toast((label?label+' ':'')+'copied!'));
}
